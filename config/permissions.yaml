# AetoxClaw Permissions Configuration
# Fully Unlocked Mode

# Allowed base drives (Restricted to workspace and specific data drives)
allowed_roots:
  - "E:\\Aetox\\"
  - "E:\\AetoxData\\"

# Forbidden paths (Sensitive system areas)
sensitive_zones:
  - "C:\\Windows"
  - "C:\\Program Files"

# Risk levels for operations (Hardened for real-world stability)
risk_rules:
  organize: "medium"
  read: "low"
  write: "medium"
  delete: "high"
