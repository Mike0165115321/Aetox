allowed_paths:
  - "."  # Current project directory
  - "C:/AetoxOS_Workspace"
  - "C:/Users/{username}/Documents/AetoxOS_Data"
  - "E:/Aetox"

forbidden_paths:
  - "C:/Windows"
  - "C:/Program Files"
  - "C:/Users/{username}/AppData"

risk_rules:
  high:
    - delete_file
    - run_code
    - move_file
  medium:
    - write_file
    - create_directory
  low:
    - list_files
    - read_file
